<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Schlag den Narr — Buzzer</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --gold: #E8B400;
    --blue: #0055CC;
    --blue-dark: #003388;
    --red: #CC1100;
    --dark: #080C14;
    --panel: #0D1422;
    --border: rgba(255,255,255,0.12);
    --text: #E8EAF0;
    --text-dim: rgba(232,234,240,0.5);
    --green: #00BB55;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Roboto Condensed', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 32px 24px; gap: 20px;
  }
  #setup-screen .logo {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 2rem; letter-spacing: 5px; color: var(--gold); text-transform: uppercase;
    text-align: center;
  }
  #setup-screen .sub {
    font-size: 0.85rem; color: var(--text-dim); letter-spacing: 2px; text-align: center;
  }
  .side-btn {
    width: 100%; padding: 22px; border: none; border-radius: 8px; cursor: pointer;
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.4rem;
    letter-spacing: 3px; text-transform: uppercase; color: #fff;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 14px;
    border-bottom: 4px solid rgba(0,0,0,0.3);
  }
  .side-btn.red { background: linear-gradient(160deg, #CC1100, #990000); }
  .side-btn.blue { background: linear-gradient(160deg, #0055CC, #003388); }
  .side-btn:active { transform: scale(0.97); filter: brightness(0.9); }
  .side-btn .icon { font-size: 2rem; }

  .name-input {
    width: 100%; padding: 16px 18px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'Roboto Condensed', sans-serif; font-size: 1.1rem;
    outline: none; text-align: center;
  }
  .name-input:focus { border-color: var(--gold); }
  .name-input::placeholder { color: var(--text-dim); }

  /* ── BUZZ SCREEN ── */
  #buzz-screen {
    display: none; flex-direction: column;
    height: 100vh; width: 100%;
  }

  /* Header strip */
  #buzz-header {
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(8,12,20,0.9);
  }
  #buzz-header .player-name {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase;
  }
  #buzz-header .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); transition: background 0.3s;
  }
  #buzz-header .conn-dot.on { background: var(--green); }

  /* Content area — shows question from host */
  #content-area {
    flex: 1; overflow-y: auto;
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 12px;
  }

  .content-card {
    background: var(--panel); border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: 4px; padding: 16px;
  }
  .content-card .label {
    font-size: 0.7rem; color: var(--text-dim); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .content-card .value {
    font-family: 'Roboto Condensed', sans-serif; font-weight: 700;
    font-size: 1.1rem; color: var(--text); line-height: 1.4;
  }

  /* Score row */
  #score-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .score-chip {
    flex: 1; min-width: 80px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; padding: 10px 12px; text-align: center;
  }
  .score-chip .sname {
    font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .score-chip .sval {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.5rem; color: #fff;
  }

  /* THE BUZZ BUTTON */
  #buzz-btn-area {
    padding: 16px;
    flex-shrink: 0;
  }
  #buzz-btn {
    width: 100%;
    height: 180px;
    border: none; border-radius: 12px; cursor: pointer;
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 3rem; letter-spacing: 4px; text-transform: uppercase;
    color: #fff; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    border-bottom: 6px solid rgba(0,0,0,0.3);
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    position: relative; overflow: hidden;
  }
  #buzz-btn::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0); transition: background 0.1s;
  }
  #buzz-btn:active::after { background: rgba(255,255,255,0.15); }
  #buzz-btn.red { background: linear-gradient(160deg, #CC1100, #880000); }
  #buzz-btn.blue { background: linear-gradient(160deg, #0055CC, #002288); }
  #buzz-btn:active { transform: scale(0.97) translateY(3px); border-bottom-width: 3px; }
  #buzz-btn.disabled { opacity: 0.35; pointer-events: none; }
  #buzz-btn.buzzed { animation: buzzedPulse 0.5s ease-out; }
  @keyframes buzzedPulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.8); }
  }

  #buzz-btn .buzz-sub {
    font-size: 0.9rem; opacity: 0.75; letter-spacing: 2px;
    font-family: 'Roboto Condensed', sans-serif; font-weight: 400;
  }

  /* Status bar */
  #status-bar {
    text-align: center; padding: 8px;
    font-size: 0.72rem; letter-spacing: 2px; color: var(--text-dim);
    background: rgba(8,12,20,0.9);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #status-bar.connected { color: var(--green); }

  /* Toast */
  #toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--panel); border: 1px solid var(--gold); border-left: 3px solid var(--gold);
    color: var(--text); font-family: 'Roboto Condensed', sans-serif; font-weight: 700;
    font-size: 0.95rem; letter-spacing: 1px; padding: 10px 20px; border-radius: 4px;
    z-index: 2000; transition: transform 0.3s ease; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── SETUP ── -->
<div id="setup-screen">
  <div class="logo">🤡 Schlag den Narr</div>
  <div class="sub">SPIELER-BUZZER</div>

  <input type="text" class="name-input" id="player-name-input" placeholder="Dein Name..." maxlength="20">

  <div class="side-btn red" onclick="chooseSide('left')">
    <span class="icon">🔴</span> Spieler Links
  </div>
  <div class="side-btn blue" onclick="chooseSide('right')">
    <span class="icon">🔵</span> Spieler Rechts
  </div>

  <div style="font-size:0.75rem; color:var(--text-dim); text-align:center; line-height:1.6; max-width:280px;">
    Wähle deine Seite.<br>Der Moderator spielt auf dem Haupt-Gerät.
  </div>
</div>

<!-- ── BUZZ SCREEN ── -->
<div id="buzz-screen">
  <div id="buzz-header">
    <div class="player-name" id="header-player-name">–</div>
    <div>
      <span style="font-size:0.75rem; color:var(--text-dim); margin-right:8px;" id="game-label-small">WARTE...</span>
      <span class="conn-dot" id="conn-dot"></span>
    </div>
  </div>

  <div id="content-area">
    <!-- Score row -->
    <div id="score-row"></div>

    <!-- Current question/content -->
    <div class="content-card" id="current-content" style="display:none;">
      <div class="label" id="content-label">AKTUELLE AUFGABE</div>
      <div class="value" id="content-value">–</div>
    </div>
  </div>

  <div id="buzz-btn-area">
    <button id="buzz-btn" class="red" ontouchstart="triggerBuzz(event)" onclick="triggerBuzz(event)">
      <span>BUZZ!</span>
      <span class="buzz-sub" id="buzz-player-label">–</span>
    </button>
  </div>

  <div id="status-bar">VERBINDE...</div>
</div>

<script>
const SUPA_URL = 'https://iismcfyjlxtslqdbomtj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlpc21jZnlqbHh0c2xxZGJvbXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3ODA2NjEsImV4cCI6MjA4ODM1NjY2MX0.ZYLWzBmIhOyZH43adYeaXvDanzQGcu59WXLcyEzNvu8';
const ROOM = 'schlag-den-narr-main';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

let mySide = null;
let myName = '';
let buzzBlocked = false;
let channel = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function chooseSide(side) {
  const nameInput = document.getElementById('player-name-input');
  const name = nameInput.value.trim();
  if (!name) { showToast('❗ Bitte Name eingeben!'); nameInput.focus(); return; }

  mySide = side;
  myName = name;

  // Update UI
  document.getElementById('header-player-name').textContent = name;
  document.getElementById('header-player-name').style.color = side === 'left' ? '#FF5555' : '#5599FF';
  document.getElementById('buzz-player-label').textContent = name;
  const btn = document.getElementById('buzz-btn');
  btn.className = side === 'left' ? 'red' : 'blue';

  // Switch screens
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('buzz-screen').style.display = 'flex';

  // Connect
  initRealtime();
}

function triggerBuzz(e) {
  if (e) e.preventDefault();
  if (buzzBlocked || !mySide || !channel) return;

  // Haptic feedback
  if (navigator.vibrate) navigator.vibrate([80, 30, 80]);

  buzzBlocked = true;
  const btn = document.getElementById('buzz-btn');
  btn.classList.add('buzzed');
  btn.classList.add('disabled');
  document.getElementById('game-label-small').textContent = '⚡ GEDRÜCKT!';

  // Broadcast buzz to host and dashboard
  channel.send({
    type: 'broadcast',
    event: 'buzz',
    payload: { side: mySide, playerName: myName }
  });

  setTimeout(() => {
    btn.classList.remove('buzzed');
    btn.classList.remove('disabled');
    buzzBlocked = false;
    document.getElementById('game-label-small').textContent = 'AKTIV';
  }, 3000);
}

function updateScores(allScores, allPlayers) {
  if (!allScores || !allPlayers) return;
  const sorted = [...allPlayers].sort((a,b) => (allScores[b]||0) - (allScores[a]||0));
  const icons = ['⭐','⚔️','🔥','💥','🎯','🌟'];
  document.getElementById('score-row').innerHTML = sorted.map((p,i) => {
    const origIdx = allPlayers.indexOf(p);
    return `<div class="score-chip">
      <div class="sname">${icons[origIdx]||''} ${p}</div>
      <div class="sval">${allScores[p]||0}</div>
    </div>`;
  }).join('');
}

function showContent(label, value) {
  const card = document.getElementById('current-content');
  card.style.display = 'block';
  document.getElementById('content-label').textContent = label;
  document.getElementById('content-value').textContent = value;
}

function initRealtime() {
  channel = sb.channel(ROOM, { config: { broadcast: { self: false } } });

  channel.on('broadcast', { event: 'game_state' }, ({ payload }) => {
    const { gameName, gameIcon, allScores, allPlayers, phase, resultTitle } = payload;
    if (gameName) document.getElementById('game-label-small').textContent = `${gameIcon||''} ${gameName}`;
    updateScores(allScores, allPlayers);
    if (phase === 'result') {
      buzzBlocked = false;
      document.getElementById('buzz-btn').classList.remove('disabled');
      showContent('ERGEBNIS', resultTitle || '');
    }
    if (phase === 'playing') {
      buzzBlocked = false;
      document.getElementById('buzz-btn').classList.remove('disabled');
    }
  });

  channel.on('broadcast', { event: 'scores' }, ({ payload }) => {
    updateScores(payload.allScores, payload.allPlayers);
  });

  channel.on('broadcast', { event: 'display' }, ({ payload }) => {
    const { type } = payload;
    if (type === 'quiz_question') {
      showContent('FRAGE', payload.question || '');
    }
    if (type === 'tf_question') {
      showContent('WAHR ODER FALSCH?', payload.question || '');
    }
    if (type === 'number_question') {
      showContent('SCHÄTZE!', payload.question || '');
    }
    if (type === 'emoji_question') {
      showContent('EMOJI-RÄTSEL', payload.emojis + ' — ' + (payload.hint||''));
    }
    if (type === 'word_category') {
      showContent('WÖRTER-STAFFEL', payload.catName + ': ' + (payload.examples||[]).join(', '));
    }
    if (type === 'physical') {
      showContent('KÖRPER-CHALLENGE', payload.name + ': ' + (payload.desc||''));
    }
    if (type === 'photo_blur') {
      showContent('FOTO-RÄTSEL', 'Wer ist auf dem Bild? Drücke wenn du es weißt!');
    }
    if (type === 'buzz_flash') {
      // Someone else buzzed
      if (payload.side !== mySide) {
        buzzBlocked = true;
        document.getElementById('buzz-btn').classList.add('disabled');
        document.getElementById('game-label-small').textContent = payload.name.toUpperCase() + ' hat gedrückt!';
      }
    }
  });

  // Listen for buzz from host (to block other player's buzzer)
  channel.on('broadcast', { event: 'buzz' }, ({ payload }) => {
    if (payload.side !== mySide) {
      // Other player buzzed first
      buzzBlocked = true;
      document.getElementById('buzz-btn').classList.add('disabled');
      document.getElementById('game-label-small').textContent = (payload.playerName||'Gegner') + ' war schneller!';
      setTimeout(() => {
        buzzBlocked = false;
        document.getElementById('buzz-btn').classList.remove('disabled');
        document.getElementById('game-label-small').textContent = 'AKTIV';
      }, 3000);
    }
  });

  channel
    .on('system', {}, ({ event }) => {
      const statusBar = document.getElementById('status-bar');
      const dot = document.getElementById('conn-dot');
      if (event === 'SUBSCRIBED') {
        statusBar.textContent = '● VERBUNDEN';
        statusBar.className = 'connected';
        dot.classList.add('on');
      } else {
        statusBar.textContent = '● GETRENNT — Seite neu laden';
        statusBar.className = '';
        dot.classList.remove('on');
      }
    })
    .subscribe();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Schlag den Narr — Buzzer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --gold: #E8B400;
    --blue: #0055CC;
    --blue-dark: #003388;
    --red: #CC1100;
    --dark: #080C14;
    --panel: #0D1422;
    --border: rgba(255,255,255,0.12);
    --text: #E8EAF0;
    --text-dim: rgba(232,234,240,0.5);
    --green: #00BB55;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Roboto Condensed', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 32px 24px; gap: 16px;
  }
  #setup-screen .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem; letter-spacing: 8px; color: var(--gold); text-transform: uppercase;
    text-align: center; text-shadow: 0 0 40px rgba(232,180,0,0.25);
  }
  #setup-screen .sub {
    font-size: 0.85rem; color: var(--text-dim); letter-spacing: 2px; text-align: center;
    margin-bottom: 8px;
  }
  .name-input {
    width: 100%; padding: 18px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'Oswald', sans-serif; font-size: 1.3rem;
    outline: none; text-align: center; letter-spacing: 2px;
    max-width: 360px;
  }
  .name-input:focus { border-color: var(--gold); }
  .name-input::placeholder { color: var(--text-dim); font-size: 1rem; letter-spacing: 1px; }

  .connect-btn {
    width: 100%; max-width: 360px;
    padding: 20px; border: none; border-radius: 8px; cursor: pointer;
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.4rem;
    letter-spacing: 3px; text-transform: uppercase; color: #0D0D0D;
    background: var(--gold);
    border-bottom: 5px solid #A07800;
    transition: all 0.15s;
  }
  .connect-btn:active { transform: scale(0.97) translateY(2px); border-bottom-width: 2px; }

  .setup-hint {
    font-size: 0.8rem; color: var(--text-dim); text-align: center; line-height: 1.6;
    max-width: 300px;
  }

  /* ── BUZZ SCREEN ── */
  #buzz-screen {
    display: none; flex-direction: column;
    height: 100vh; width: 100%;
  }

  /* Header */
  #buzz-header {
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(8,12,20,0.9);
    flex-shrink: 0;
  }
  #buzz-header .player-name {
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase;
  }
  #buzz-header .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); transition: background 0.3s; margin-left: 8px;
  }
  #buzz-header .conn-dot.on { background: var(--green); }
  #game-label-small {
    font-size: 0.75rem; color: var(--text-dim); letter-spacing: 1px; margin-right: 8px;
  }

  /* Content */
  #content-area {
    flex: 1; overflow-y: auto;
    padding: 14px 18px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* Matchup card */
  #matchup-card {
    background: rgba(0,85,204,0.1); border: 1px solid rgba(0,85,204,0.3);
    border-left: 3px solid var(--blue);
    border-radius: 4px; padding: 12px 16px;
    text-align: center;
  }
  #matchup-card .mc-label {
    font-size: 0.65rem; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
  }
  #matchup-display {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: 1px;
  }

  /* Content card */
  .content-card {
    background: var(--panel); border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: 4px; padding: 14px 16px;
  }
  .content-card .label {
    font-size: 0.65rem; color: var(--text-dim); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .content-card .value {
    font-family: 'Roboto Condensed', sans-serif; font-weight: 700;
    font-size: 1.05rem; color: var(--text); line-height: 1.4;
  }

  /* Score row */
  #score-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .score-chip {
    flex: 1; min-width: 70px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px 10px; text-align: center;
  }
  .score-chip.me { border-color: var(--gold); }
  .score-chip .sname {
    font-size: 0.65rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .score-chip .sval {
    font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.4rem; color: #fff;
  }

  /* ── BUZZ BUTTON ── */
  #buzz-btn-area {
    padding: 14px;
    flex-shrink: 0;
  }
  #buzz-btn {
    width: 100%;
    height: 190px;
    border: none; border-radius: 12px; cursor: pointer;
    font-family: 'Oswald', sans-serif; font-weight: 700;
    font-size: 3.2rem; letter-spacing: 4px; text-transform: uppercase;
    color: #fff; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    border-bottom: 6px solid rgba(0,0,0,0.3);
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
    position: relative; overflow: hidden;
  }
  #buzz-btn::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0); transition: background 0.1s;
  }
  #buzz-btn:active::after { background: rgba(255,255,255,0.15); }

  #buzz-btn.red  { background: linear-gradient(160deg, #CC1100, #880000); box-shadow: 0 6px 30px rgba(200,0,0,0.4); }
  #buzz-btn.blue { background: linear-gradient(160deg, #0055CC, #002288); box-shadow: 0 6px 30px rgba(0,85,204,0.4); }
  #buzz-btn.watching {
    background: linear-gradient(160deg, #141C2E, #0D1220);
    border: 2px solid rgba(255,255,255,0.08);
    box-shadow: none; cursor: default;
    opacity: 0.7;
  }

  #buzz-btn:not(.watching):active { transform: scale(0.97) translateY(3px); border-bottom-width: 3px; }
  #buzz-btn.disabled { opacity: 0.4; pointer-events: none; }
  #buzz-btn.buzzed { animation: buzzedPulse 0.5s ease-out; }
  @keyframes buzzedPulse {
    0%, 100% { filter: brightness(1); }
    50%       { filter: brightness(1.8); }
  }

  #buzz-btn .buzz-main { font-size: 3rem; line-height: 1; }
  #buzz-btn .buzz-sub {
    font-size: 0.9rem; opacity: 0.8; letter-spacing: 2px;
    font-family: 'Roboto Condensed', sans-serif; font-weight: 400;
  }

  /* Status bar */
  #status-bar {
    text-align: center; padding: 8px;
    font-size: 0.72rem; letter-spacing: 2px; color: var(--text-dim);
    background: rgba(8,12,20,0.9);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #status-bar.connected { color: var(--green); }

  /* Toast */
  #toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: var(--panel); border: 1px solid var(--gold); border-left: 3px solid var(--gold);
    color: var(--text); font-family: 'Roboto Condensed', sans-serif; font-weight: 700;
    font-size: 0.95rem; letter-spacing: 1px; padding: 10px 20px; border-radius: 4px;
    z-index: 2000; transition: transform 0.3s ease; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── SETUP ── -->
<div id="setup-screen">
  <div class="logo">Schlag den Narr</div>
  <div class="sub">Spieler-Buzzer</div>

  <input type="text" class="name-input" id="player-name-input"
    placeholder="Dein Name..."
    maxlength="20"
    onkeydown="if(event.key==='Enter') connect()">

  <button class="connect-btn" onclick="connect()">Verbinden</button>

  <div class="setup-hint">
    Name eingeben — du wirst automatisch dem richtigen Duell zugewiesen wenn du dran bist.
  </div>
</div>

<!-- ── BUZZ SCREEN ── -->
<div id="buzz-screen">
  <div id="buzz-header">
    <div class="player-name" id="header-player-name">–</div>
    <div style="display:flex; align-items:center;">
      <span id="game-label-small">WARTE AUF SPIEL...</span>
      <span class="conn-dot" id="conn-dot"></span>
    </div>
  </div>

  <div id="content-area">
    <div id="score-row"></div>

    <div id="matchup-card" style="display:none;">
      <div class="mc-label">Aktuelles Duell</div>
      <div id="matchup-display">–</div>
    </div>

    <div class="content-card" id="current-content" style="display:none;">
      <div class="label" id="content-label">AKTUELLE AUFGABE</div>
      <div class="value" id="content-value">–</div>
    </div>
  </div>

  <div id="buzz-btn-area">
    <button id="buzz-btn" class="watching"
      ontouchstart="triggerBuzz(event)"
      onclick="triggerBuzz(event)">
      <span class="buzz-main" id="buzz-main-text">· · ·</span>
      <span class="buzz-sub" id="buzz-sub-text">Warte auf dein Duell</span>
    </button>
  </div>

  <div id="status-bar">VERBINDE...</div>
</div>

<script>
const SUPA_URL = 'https://iismcfyjlxtslqdbomtj.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlpc21jZnlqbHh0c2xxZGJvbXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3ODA2NjEsImV4cCI6MjA4ODM1NjY2MX0.ZYLWzBmIhOyZH43adYeaXvDanzQGcu59WXLcyEzNvu8';
const ROOM = 'schlag-den-narr-main';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

let myName = '';
let mySide = null;   // 'left' | 'right' | null (watching)
let buzzBlocked = false;
let channel = null;

// ── HELPERS ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showContent(label, value) {
  const card = document.getElementById('current-content');
  card.style.display = 'block';
  document.getElementById('content-label').textContent = label;
  document.getElementById('content-value').textContent = value;
}

// ── CONNECT ──
function connect() {
  const nameInput = document.getElementById('player-name-input');
  const name = nameInput.value.trim();
  if (!name) { showToast('❗ Bitte deinen Namen eingeben!'); nameInput.focus(); return; }

  myName = name;
  document.getElementById('header-player-name').textContent = name;

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('buzz-screen').style.display = 'flex';

  initRealtime();
}

// ── BUZZ BUTTON STATE ──
function updateBuzzButton() {
  const btn = document.getElementById('buzz-btn');
  const mainText = document.getElementById('buzz-main-text');
  const subText = document.getElementById('buzz-sub-text');

  if (mySide === 'left') {
    btn.className = 'red';
    mainText.textContent = 'BUZZ!';
    subText.textContent = myName;
  } else if (mySide === 'right') {
    btn.className = 'blue';
    mainText.textContent = 'BUZZ!';
    subText.textContent = myName;
  } else {
    btn.className = 'watching';
    mainText.textContent = '· · ·';
    subText.textContent = 'Nicht dein Duell';
  }
}

// ── SOUNDS (Web Audio API) ──
function playBuzzSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Layer 1: harsh saw buzz
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(90, ctx.currentTime + 0.22);
    gain.gain.setValueAtTime(0.55, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.45);
    // Layer 2: low thud
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(80, ctx.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.15);
    gain2.gain.setValueAtTime(0.6, ctx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc2.start(ctx.currentTime); osc2.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

function playLockedSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.setValueAtTime(220, ctx.currentTime + 0.08);
    osc.frequency.setValueAtTime(180, ctx.currentTime + 0.16);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

// ── TRIGGER BUZZ ──
function triggerBuzz(e) {
  if (e) e.preventDefault();
  if (!mySide || buzzBlocked || !channel) return;

  if (navigator.vibrate) navigator.vibrate([80, 30, 80]);
  playBuzzSound();

  buzzBlocked = true;
  const btn = document.getElementById('buzz-btn');
  btn.classList.add('buzzed', 'disabled');
  document.getElementById('game-label-small').textContent = '⚡ DU WARST SCHNELLER!';

  channel.send({
    type: 'broadcast',
    event: 'buzz',
    payload: { side: mySide, playerName: myName }
  });
  // Stay locked — host will release with buzz_reset
}

// ── SCORES ──
function updateScores(allScores, allPlayers) {
  if (!allScores || !allPlayers) return;
  const sorted = [...allPlayers].sort((a, b) => (allScores[b] || 0) - (allScores[a] || 0));
  const icons = ['⭐','⚔️','🔥','💥','🎯','🌟'];
  document.getElementById('score-row').innerHTML = sorted.map((p, i) => {
    const origIdx = allPlayers.indexOf(p);
    return `<div class="score-chip${p === myName ? ' me' : ''}">
      <div class="sname">${icons[origIdx] || ''} ${p}</div>
      <div class="sval">${allScores[p] || 0}</div>
    </div>`;
  }).join('');
}

// ── REALTIME ──
function initRealtime() {
  channel = sb.channel(ROOM, { config: { broadcast: { self: false } } });

  channel.on('broadcast', { event: 'game_state' }, ({ payload }) => {
    const { gameName, gameIcon, allScores, allPlayers, phase, resultTitle, playerLeft, playerRight } = payload;

    // Auto-assign side — case-insensitive name match
    const prevSide = mySide;
    const pL = (playerLeft  || '').trim().toLowerCase();
    const pR = (playerRight || '').trim().toLowerCase();
    const me = myName.trim().toLowerCase();
    if (pL && pL === me) mySide = 'left';
    else if (pR && pR === me) mySide = 'right';
    else mySide = null;

    if (mySide !== prevSide) {
      updateBuzzButton();
      if (mySide === 'left') showToast(`🔴 Du spielst als LINKS!`);
      else if (mySide === 'right') showToast(`🔵 Du spielst als RECHTS!`);
    }

    if (gameName) document.getElementById('game-label-small').textContent = `${gameIcon || ''} ${gameName}`;
    updateScores(allScores, allPlayers);

    // Matchup display
    if (playerLeft && playerRight) {
      const mc = document.getElementById('matchup-card');
      mc.style.display = 'block';
      document.getElementById('matchup-display').innerHTML =
        `<span style="color:#FF6666">🔴 ${playerLeft}</span>
         <span style="color:rgba(255,255,255,0.3); margin:0 8px; font-size:0.9rem;">VS</span>
         <span style="color:#6699FF">🔵 ${playerRight}</span>`;
    }

    if (phase === 'result') {
      buzzBlocked = false;
      mySide = null; // lock buzzers during result
      updateBuzzButton();
      document.getElementById('buzz-btn').classList.remove('disabled');
      showContent('ERGEBNIS', resultTitle || '');
    }

    if (phase === 'playing') {
      buzzBlocked = false;
      document.getElementById('buzz-btn').classList.remove('disabled');
    }
  });

  channel.on('broadcast', { event: 'scores' }, ({ payload }) => {
    updateScores(payload.allScores, payload.allPlayers);
  });

  channel.on('broadcast', { event: 'display' }, ({ payload }) => {
    const { type } = payload;
    if (type === 'quiz_question')  showContent('FRAGE', payload.question || '');
    if (type === 'tf_question')    showContent('WAHR ODER FALSCH?', payload.question || '');
    if (type === 'number_question') showContent('SCHÄTZE!', payload.question || '');
    if (type === 'emoji_question') showContent('EMOJI-RÄTSEL', payload.emojis + ' — ' + (payload.hint || ''));
    if (type === 'word_category')  showContent('WÖRTER-STAFFEL', payload.catName + ': ' + (payload.examples || []).join(', '));
    if (type === 'physical')       showContent('SPORT-CHALLENGE', payload.name + ': ' + (payload.desc || ''));
    if (type === 'photo_blur')     showContent('FOTO-RÄTSEL', 'Wer ist auf dem Bild? Drücke wenn du es weißt!');

    if (type === 'buzz_flash') {
      // Another player buzzed — hide button until host releases
      if (payload.side !== mySide) {
        buzzBlocked = true;
        document.getElementById('buzz-btn-area').style.display = 'none';
        document.getElementById('game-label-small').textContent = (payload.name || 'Gegner') + ' war schneller!';
      }
    }
  });

  // Someone buzzed — lock the loser's buzzer until host releases
  channel.on('broadcast', { event: 'buzz' }, ({ payload }) => {
    if (payload.side !== mySide) {
      buzzBlocked = true;
      playLockedSound();
      document.getElementById('buzz-btn-area').style.display = 'none';
      document.getElementById('game-label-small').textContent = (payload.playerName || 'Gegner') + ' war schneller!';
    }
  });

  // host.html listens to buzz from phone and re-broadcasts buzz_locked
  channel.on('broadcast', { event: 'buzz_locked' }, ({ payload }) => {
    if (payload.side !== mySide) {
      buzzBlocked = true;
      playLockedSound();
      document.getElementById('buzz-btn-area').style.display = 'none';
      document.getElementById('game-label-small').textContent = (payload.playerName || 'Gegner') + ' war schneller!';
    }
  });

  // Moderator releases — restore buzzer for everyone
  channel.on('broadcast', { event: 'buzz_reset' }, () => {
    buzzBlocked = false;
    document.getElementById('buzz-btn-area').style.display = 'flex';
    const btn = document.getElementById('buzz-btn');
    btn.classList.remove('buzzed', 'disabled');
    document.getElementById('game-label-small').textContent = mySide ? 'AKTIV' : '';
  });

  channel
    .on('system', {}, ({ event }) => {
      const statusBar = document.getElementById('status-bar');
      const dot = document.getElementById('conn-dot');
      if (event === 'SUBSCRIBED') {
        statusBar.textContent = '● VERBUNDEN';
        statusBar.className = 'connected';
        dot.classList.add('on');
        // Request current state from host (for late joiners)
        channel.send({ type: 'broadcast', event: 'request_state', payload: {} });
      } else {
        statusBar.textContent = '● GETRENNT — Seite neu laden';
        statusBar.className = '';
        dot.classList.remove('on');
      }
    })
    .subscribe();
}
</script>
</body>
</html>
